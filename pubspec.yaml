name: sirat_i_nur
description: "Sirat-i Nur - Your Complete Islamic Companion"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & Navigation
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0

  # Backend & Network
  supabase_flutter: ^2.6.1
  dio: ^5.9.2

  # AI
  google_generative_ai: ^0.4.5

  # Local Storage
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Prayer & Location
  adhan: ^2.0.0+1
  flutter_compass: ^0.8.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  hijri: ^3.0.0
  timezone: ^0.11.0

  # Media
  just_audio: ^0.10.5

  # UI
  cupertino_icons: ^1.0.8
  table_calendar: ^3.2.0

  # Monetization
  in_app_purchase: ^3.2.3

  # Notifications & Widgets
  flutter_local_notifications: ^21.0.0
  home_widget: ^0.9.0

  # Utilities
  url_launcher: ^6.3.2
  vibration: ^3.1.8
  intl: ^0.20.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  webview_flutter: ^4.13.1
  audio_session: ^0.2.3
  # share_plus 13.0.0 requires Flutter >=3.41.6; this repo currently validates
  # on Flutter 3.41.4, so keep the supported 12.x line until the toolchain moves.
  share_plus: ^12.0.1
  http: ^1.6.0
  lat_lng_to_timezone: ^0.2.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  translator: ^1.0.4+1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/data/
    - assets/audio/adhan/
    - assets/audio/ui/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F1A0F"
  image: "assets/icon/splash_logo.png"
  android_12:
    image: "assets/icon/splash_logo.png"
    icon_background_color: "#0F1A0F"
